services:
  bookmark-navigation:
    image: bookmark-navigation:${NAV_IMAGE_TAG:-local}
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${NAV_BIND_ADDRESS:-127.0.0.1}:${NAV_PORT:-8080}:8080"
    networks:
      navigation:
        ipv4_address: ${NAV_APP_IP:-172.30.0.2}
    volumes:
      - ${NAV_DATA_DIR:-./data}:/data
      - ../bookmark_policy.json:/config/bookmark_policy.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  navigation:
    ipam:
      config:
        - subnet: ${NAV_DOCKER_SUBNET:-172.30.0.0/24}
          gateway: ${NAV_DOCKER_GATEWAY:-172.30.0.1}
