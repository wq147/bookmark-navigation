services:
  bookmark-navigation:
    image: ${NAV_IMAGE_REPOSITORY:-bookmark-navigation}:${NAV_IMAGE_TAG}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${NAV_BIND_ADDRESS}:${NAV_PORT}:8080"
    networks:
      navigation:
        ipv4_address: ${NAV_APP_IP}
    volumes:
      - ${NAV_DATA_DIR}:/data
      - ${NAV_POLICY_PATH}:/config/bookmark_policy.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  navigation:
    ipam:
      config:
        - subnet: ${NAV_DOCKER_SUBNET}
          gateway: ${NAV_DOCKER_GATEWAY}
